global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: 'project-documentation'
    static_configs:
      - targets: ['localhost:8000']
        labels:
          service: 'project-documentation'
          environment: 'production'
          team: 'ai-factory'
    
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['localhost:9100']
    
  - job_name: 'docker'
    static_configs:
      - targets: ['localhost:9323']
    
  - job_name: 'blackbox'
    static_configs:
      - targets: ['localhost:9115']
    
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['localhost:8080']
