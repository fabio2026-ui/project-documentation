version: '3.8'

services:
  project-documentation:
    build: .
    container_name: project-documentation
    restart: unless-stopped
    ports:
      - "8080:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - DEBUG=false
    
  # 备份服务
  backup:
    image: alpine:latest
    container_name: project-documentation-backup
    volumes:
      - ./backup:/backup
      - project-documentation_data:/app/data:ro
    command: >
      sh -c "
        echo 'Starting backup...' &&
        cd /backup &&
        python backup.py &&
        echo 'Backup completed'
      "
    networks:
      - project-documentation-network
    restart: "no"  # 手动触发或通过cron触发

  # 安全扫描服务
  security-scan:
    image: aquasec/trivy:latest
    container_name: project-documentation-security-scan
    volumes:
      - ./security:/security
    command: >
      sh -c "
        echo 'Starting security scan...' &&
        trivy image project-documentation:latest &&
        echo 'Security scan completed'
      "
    networks:
      - project-documentation-network
    restart: "no"  # 手动触发或通过cron触发

volumes:
      - ./data:/app/data
    
  # 监控服务
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    