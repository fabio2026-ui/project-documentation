groups:
  - name: project-documentation_alerts
    rules:
      - alert: project-documentation_high_error_rate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
          service: project-documentation
        annotations:
          summary: "High error rate in project-documentation"
          description: "Error rate is above 5% for the last 5 minutes"
      
      - alert: project-documentation_high_latency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
          service: project-documentation
        annotations:
          summary: "High latency in project-documentation"
          description: "95th percentile latency is above 1 second for the last 5 minutes"
      
      - alert: project-documentation_low_availability
        expr: up{job="project-documentation"} == 0
        for: 2m
        labels:
          severity: critical
          service: project-documentation
        annotations:
          summary: "project-documentation is down"
          description: "Service has been down for more than 2 minutes"
      
      - alert: project-documentation_high_cpu_usage
        expr: rate(process_cpu_seconds_total[5m]) > 0.8
        for: 5m
        labels:
          severity: warning
          service: project-documentation
        annotations:
          summary: "High CPU usage in project-documentation"
          description: "CPU usage is above 80% for the last 5 minutes"
      
      - alert: project-documentation_high_memory_usage
        expr: process_resident_memory_bytes / (1024 * 1024) > 512
        for: 5m
        labels:
          severity: warning
          service: project-documentation
        annotations:
          summary: "High memory usage in project-documentation"
          description: "Memory usage is above 512MB for the last 5 minutes"
      
      - alert: project-documentation_low_disk_space
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.2
        for: 5m
        labels:
          severity: warning
          service: project-documentation
        annotations:
          summary: "Low disk space for project-documentation"
          description: "Disk space is below 20% for the last 5 minutes"
